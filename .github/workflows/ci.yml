name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint, format, types, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run check

      # Builds the Astro site directly (skips the `tinacms build` step in
      # `npm run build`, which needs TinaCloud secrets) — this is the same
      # check Vercel's preview/production builds layer on top of.
      - name: Build
        run: npx astro build
